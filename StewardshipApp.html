// ── GOOGLE SHEETS BACKUP ──────────────────────────────────────────────────
const BACKUP_URL="https://script.google.com/macros/s/AKfycbynJ6Tm_AyhjfhgzZp6OYvr1RxZLK4mvnFjsz-LASFoxUpappyRlHH1L5AVR22OLPWSoQ/exec";

async function backupToSheets(){
  try{
    const allKeys=Object.keys(localStorage);
    // Daily progress
    const daily_progress=[];
    allKeys.filter(k=>k.startsWith("checked-")).forEach(k=>{
      const date=k.replace("checked-","");
      let data={};try{data=JSON.parse(localStorage.getItem(k)||"{}");}catch{}
      Object.entries(data).forEach(([taskKey,completed])=>{
        if(completed){
          const parts=taskKey.split("-");
          daily_progress.push({date,item_id:parts[0],task_id:parts.slice(1).join("-"),completed});
        }
      });
    });
    // Savings goals
    let savings_goals=[];try{savings_goals=JSON.parse(localStorage.getItem("savingsgoals")||"[]");}catch{}
    // Shopping list
    let shopping_list=[];try{shopping_list=JSON.parse(localStorage.getItem("shoplist")||"[]");}catch{}
    // Devotion notes
    const devotion_notes=[];
    allKeys.filter(k=>k.startsWith("devot-note-")).forEach(k=>{
      const date=k.replace("devot-note-","");
      const note=localStorage.getItem(k);
      let doneCount=0;
      try{const d=JSON.parse(localStorage.getItem("devot-done")||"{}");doneCount=Object.keys(d).filter(dk=>dk.includes(date)).length;}catch{}
      if(note)devotion_notes.push({date,plan_day:0,note,tracks_completed:doneCount});
    });
    // Custom items
    const custom_items=[];
    try{
      const ci=JSON.parse(localStorage.getItem("catItems-v1")||"{}");
      Object.entries(ci).forEach(([cat_id,items])=>{
        items.filter(it=>String(it.id).startsWith("c-")).forEach(it=>{
          custom_items.push({cat_id,id:it.id,label:it.label,icon:it.icon});
        });
      });
    }catch{}
    const payload={action:"backup_all",daily_progress,savings_goals,shopping_list,devotion_notes,custom_items};
    const res=await fetch(BACKUP_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const result=await res.json();
    return result.success;
  }catch(err){console.error("Backup failed:",err);return false;}
}

async function restoreFromSheets(){
  try{
    const res=await fetch(BACKUP_URL+"?action=restore");
    const result=await res.json();
    if(!result.success)return false;
    const data=result.data;
    if(data.savings_goals?.length)localStorage.setItem("savingsgoals",JSON.stringify(data.savings_goals));
    if(data.shopping_list?.length)localStorage.setItem("shoplist",JSON.stringify(data.shopping_list));
    data.devotion_notes?.forEach(n=>{if(n.note)localStorage.setItem("devot-note-"+n.date,n.note);});
    if(data.custom_items?.length){
      let ci={};try{ci=JSON.parse(localStorage.getItem("catItems-v1")||"{}");}catch{}
      data.custom_items.forEach(it=>{
        if(!ci[it.cat_id])ci[it.cat_id]=[];
        if(!ci[it.cat_id].find(x=>x.id===it.id))ci[it.cat_id].push({id:it.id,label:it.label,icon:it.icon,color:"#00D4FF",desc:"Restored item"});
      });
      localStorage.setItem("catItems-v1",JSON.stringify(ci));
    }
    return true;
  }catch(err){console.error("Restore failed:",err);return false;}
}

// Load saved schedule from localStorage (user may have customised it)
function loadSchedule() {
  try {
    const saved = localStorage.getItem("notif-schedule");
    return saved ? JSON.parse(saved) : DEFAULT_SCHEDULE;
  } catch { return DEFAULT_SCHEDULE; }
}

// Build today's notification times from the schedule
function buildTodayNotifications(schedule) {
  const now = new Date();
  return schedule.filter(n => n.enabled !== false).map(n => {
    const t = new Date();
    t.setHours(n.hour, n.min, 0, 0);
    return { ...n, time: t.getTime() };
  }).filter(n => n.time > Date.now()); // only future ones
}

// Register SW and send schedule to it
async function registerAndSchedule() {
  if (!("serviceWorker" in navigator) || !("Notification" in window)) return;
  try {
    const reg = await navigator.serviceWorker.register("./sw.js");
    await navigator.serviceWorker.ready;
    const sw = reg.active || reg.waiting || reg.installing;
    if (!sw) return;
    const schedule = loadSchedule();
    const notifications = buildTodayNotifications(schedule);
    sw.postMessage({ type: "SCHEDULE", notifications });
    console.log("[Notifications] Scheduled", notifications.length, "for today");
  } catch(e) { console.error("[Notifications] SW registration failed:", e); }
}

// Request notification permission
async function requestNotifPermission() {
  if (!("Notification" in window)) return "unsupported";
  if (Notification.permission === "granted") return "granted";
  if (Notification.permission === "denied") return "denied";
  const result = await Notification.requestPermission();
  return result;
}

// Initialize on app load
async function initNotifications() {
  const perm = await requestNotifPermission();
  if (perm === "granted") {
    await registerAndSchedule();
    // Re-schedule every hour (in case user keeps app open all day)
    setInterval(registerAndSchedule, 3600000);
  }
  return perm;
}

// Call on load
window.addEventListener("load", () => {

// ═══════════════════════════════════════════════════════════════════════════
// PIN LOCK SCREEN  —  SHA-256 hashed storage
// ═══════════════════════════════════════════════════════════════════════════
const PIN_KEY     = "app-pin-hash";   // stores SHA-256 hash, never the raw PIN
const SESSION_KEY = "pin-session-v2"; // clears when browser tab closes

// SHA-256 using Web Crypto API (built into every modern browser)
async function sha256(text) {
  const msgBuffer  = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
  const hashArray  = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

function PinLock({ onUnlock }) {
  const storedHash = localStorage.getItem(PIN_KEY);
  const isSetup    = !storedHash; // no hash stored = first time

  const [pin,        setPin]        = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [step,       setStep]       = useState("enter"); // "enter" | "confirm"
  const [error,      setError]      = useState("");
  const [shake,      setShake]      = useState(false);
  const [busy,       setBusy]       = useState(false);

  const TARGET = 4;
  const filled = pin.length;

  const doShake = (msg) => {
    setError(msg);
    setShake(true);
    setTimeout(() => { setShake(false); setPin(""); }, 650);
  };

  const handleKey = async (val) => {
    if (busy) return;
    if (val === "del") { setPin(p => p.slice(0, -1)); setError(""); return; }
    if (filled >= TARGET) return;
    const next = pin + val;
    setPin(next);
    if (next.length === TARGET) {
      setBusy(true);
      await handleComplete(next);
      setBusy(false);
    }
  };

  const handleComplete = async (p) => {
    if (isSetup) {
      // ── SETUP FLOW ──────────────────────────────────────────────────
      if (step === "enter") {
        // Store the first entry and ask to confirm
        setConfirmPin(p);
        setStep("confirm");
        setPin("");
        setError("");
      } else {
        // Confirm step — must match first entry
        if (p === confirmPin) {
          const hash = await sha256(p);
          localStorage.setItem(PIN_KEY, hash);
          sessionStorage.setItem(SESSION_KEY, "1");
          onUnlock();
        } else {
          setConfirmPin("");
          setStep("enter");
          doShake("PINs don't match — try again");
        }
      }
    } else {
      // ── LOGIN FLOW ──────────────────────────────────────────────────
      const hash = await sha256(p);
      if (hash === storedHash) {
        sessionStorage.setItem(SESSION_KEY, "1");
        onUnlock();
      } else {
        doShake("Wrong PIN — try again");
      }
    }
  };

  const resetPin = () => {
    if (!window.confirm("Reset your PIN?\nYou will need to set a new 4-digit PIN.")) return;
    localStorage.removeItem(PIN_KEY);
    sessionStorage.removeItem(SESSION_KEY);
    setPin(""); setConfirmPin(""); setStep("enter"); setError("");
    window.location.reload();
  };

  const KEYS = ["1","2","3","4","5","6","7","8","9","","0","del"];

  const titleText = isSetup
    ? (step === "enter" ? "Set your PIN" : "Confirm PIN")
    : "Welcome back";

  const subText = isSetup
    ? (step === "enter"
        ? "Choose a 4-digit PIN to protect your app"
        : "Re-enter your 4-digit PIN to confirm")
    : "Enter your PIN to continue";

  return (
    <div style={{
      position:"fixed",inset:0,background:"#060B14",zIndex:9999,
      display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",fontFamily:"'DM Sans',sans-serif",overflow:"hidden"
    }}>
      {/* Atmosphere */}
      <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none"}}>
        <div style={{position:"absolute",top:"5%",left:"10%",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,#4A1A8A20 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:"10%",right:"5%",width:250,height:250,borderRadius:"50%",background:"radial-gradient(circle,#00D4FF12 0%,transparent 70%)"}}/>
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:.05}} xmlns="http://www.w3.org/2000/svg">
          <defs><pattern id="pg" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#00D4FF" strokeWidth=".5"/></pattern></defs>
          <rect width="100%" height="100%" fill="url(#pg)"/>
        </svg>
      </div>

      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:340,padding:"0 28px",textAlign:"center"}}>

        {/* App icon */}
        <div style={{
          width:76,height:76,borderRadius:24,
          background:"linear-gradient(135deg,#4A1A8A,#00D4FF)",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:34,margin:"0 auto 22px",
          boxShadow:"0 8px 32px rgba(0,212,255,.28)"
        }}>
          {isSetup ? "🔐" : "🔒"}
        </div>

        <div style={{fontSize:13,fontWeight:700,letterSpacing:2.5,color:"#00D4FF88",textTransform:"uppercase",marginBottom:8}}>Kingdom First</div>
        <div style={{fontSize:23,fontWeight:800,color:"#E8F4FF",marginBottom:6}}>{titleText}</div>
        <div style={{fontSize:13,color:"#7A9CC0",marginBottom:34,lineHeight:1.55}}>{subText}</div>

        {/* Step indicator for setup */}
        {isSetup && (
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:20}}>
            {["enter","confirm"].map((s,i) => (
              <div key={s} style={{
                width: step===s ? 20 : 8, height:8, borderRadius:4,
                background: step===s ? "#00D4FF" : "rgba(0,212,255,.2)",
                transition:"all .3s"
              }}/>
            ))}
          </div>
        )}

        {/* PIN dots */}
        <div style={{
          display:"flex",justifyContent:"center",gap:18,marginBottom:10,
          animation: shake ? "pinShake .55s ease" : "none"
        }}>
          {[0,1,2,3].map(i => {
            const active = i < filled;
            return (
              <div key={i} style={{
                width:18,height:18,borderRadius:9,
                background: active ? "#00D4FF" : "transparent",
                border: `2.5px solid ${active ? "#00D4FF" : "rgba(0,212,255,.28)"}`,
                transition:"all .15s cubic-bezier(.34,1.5,.64,1)",
                transform: active ? "scale(1.15)" : "scale(1)",
                boxShadow: active ? "0 0 14px #00D4FF77" : "none",
              }}/>
            );
          })}
        </div>

        {/* Error message */}
        <div style={{height:22,marginBottom:20,fontSize:12,color:"#F87171",fontWeight:600,transition:"opacity .2s",opacity:error?1:0}}>
          {error || " "}
        </div>

        {/* Keypad */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {KEYS.map((k, i) => {
            if (k === "") return <div key={i}/>;
            const isDel = k === "del";
            return (
              <button
                key={i}
                onClick={() => handleKey(k)}
                style={{
                  height:66,borderRadius:20,
                  background: isDel ? "rgba(248,113,113,.1)" : "rgba(0,212,255,.07)",
                  border: `1px solid ${isDel ? "rgba(248,113,113,.22)" : "rgba(0,212,255,.14)"}`,
                  color: isDel ? "#F87171" : "#E8F4FF",
                  fontSize: isDel ? 22 : 26,
                  fontWeight: 600,
                  cursor: "pointer",
                  fontFamily: "'DM Sans',sans-serif",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  transition:"transform .08s, background .15s",
                  WebkitTapHighlightColor:"transparent",
                  userSelect:"none",
                }}
                onPointerDown={e => e.currentTarget.style.transform="scale(.91)"}
                onPointerUp={e   => e.currentTarget.style.transform="scale(1)"}
                onPointerLeave={e => e.currentTarget.style.transform="scale(1)"}
              >
                {isDel ? "⌫" : k}
              </button>
            );
          })}
        </div>

        {/* Reset / Forgot PIN */}
        {!isSetup && (
          <button onClick={resetPin} style={{
            marginTop:28,background:"none",border:"none",
            color:"#3A5A7A",fontSize:12,cursor:"pointer",
            textDecoration:"underline",fontFamily:"'DM Sans',sans-serif"
          }}>
            Forgot PIN? Reset
          </button>
        )}

        <div style={{marginTop:14,fontSize:10,color:"#1E3550",lineHeight:1.6}}>
          PIN is hashed with SHA-256 and stored locally.<br/>Never transmitted anywhere.
        </div>
      </div>

      <style>{`
        @keyframes pinShake {
          0%,100%{transform:translateX(0)}
          15%{transform:translateX(-10px)}
          35%{transform:translateX(10px)}
          55%{transform:translateX(-7px)}
          75%{transform:translateX(7px)}
          90%{transform:translateX(-3px)}
        }
      `}</style>
    </div>
  );
}

    try{
      const prompt=ITEM_PROMPT.replace("{DAY}",dayName).replace("{DATE}",dateStr).replace("{ITEM_LABEL}",it.label).replace("{CAT_LABEL}",c.label);
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const raw=data.content?.find(b=>b.type==="text")?.text||"{}";
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setItemData(p=>({...p,[key]:parsed}));ss(ck,JSON.stringify(parsed));
    }catch{setItemData(p=>({...p,[key]:{error:true,tasks:[]}}));}
    finally{setLoading(p=>({...p,[key]:false}));}
  },[todayKey,dayName,dateStr,catItems]);

  const openCat=id=>{setView(id);setSidebar(false);setActiveNav(id);mainRef.current?.scrollTo(0,0);};
  const openItem=(cId,iId)=>{setView(cId+"/"+iId);if(!itemData[cId+"/"+iId])fetchItem(cId,iId);mainRef.current?.scrollTo(0,0);};
  const goBack=()=>{if(itemId)setView(catId);else setView(null);};
  const goHome=()=>{setView(null);setActiveNav("home");setSidebar(false);};
  const navTo=id=>{setSidebar(false);if(id==="home")goHome();else if(CATEGORIES.find(c=>c.id===id))openCat(id);else{setActiveNav(id);setView(null);}};
  const toggleTask=(key,tid)=>setChecked(p=>({...p,[key+"-"+tid]:!p[key+"-"+tid]}));
  const iPct=(cId,iId)=>{const k=cId+"/"+iId;const d=itemData[k];if(!d?.tasks?.length)return 0;return Math.round(d.tasks.filter(t=>checked[k+"-"+t.id]).length/d.tasks.length*100);};
  const cPct=cId=>{const its=catItems[cId]||[];if(!its.length)return 0;return Math.round(its.reduce((a,it)=>a+iPct(cId,it.id),0)/its.length);};
  const overall=Math.round(CATEGORIES.reduce((a,c)=>a+cPct(c.id),0)/CATEGORIES.length);
  const addItem=()=>{if(!newLabel.trim()||!addingTo)return;setCatItems(p=>({...p,[addingTo]:[...(p[addingTo]||[]),{id:"c-"+Date.now(),label:newLabel.trim(),icon:newIcon,color:T.accent,desc:"Custom item"}]}));setNewLabel("");setNewIcon("⭐");setAddingTo(null);};
  const impC=i=>({"Critical":"#FF4D6A","High":"#00D4FF","Medium":"#7A3AC8","Low":"#008A6A"})[i]||T.textMuted;

  const root={background:T.bg,minHeight:"100vh",width:"100%",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden",color:T.text};

  const ThemeBtn=()=><IconBtn onClick={cycleTheme} T={T}><span style={{fontSize:16}}>{themeIcon}</span></IconBtn>;
  const BackBtn=()=><IconBtn onClick={goBack} T={T}><svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8 2L2 8L8 14" stroke={T.text} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg></IconBtn>;

  // ── ADD MODAL ───────────────────────────────────────────────────────────────
  const EMOJIS=["⭐","📝","🎯","💡","🔥","🌟","🚀","🎨","📌","🏆","🔑","💫","🌙","⚡","🎁","🛠️"];
  const AddModal=()=><div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center",background:T.overlayBg,backdropFilter:"blur(8px)"}}>
    <div style={{width:"100%",maxWidth:430,background:T.itemCardBg,backdropFilter:"blur(32px)",borderRadius:"22px 22px 0 0",padding:"22px 20px 40px",border:`1px solid ${T.inputBorder}`}}>
      <div style={{width:36,height:4,borderRadius:2,background:T.textFaint,margin:"0 auto 18px"}}/>
      <div style={{fontSize:16,fontWeight:700,color:T.text,marginBottom:4}}>Add new item</div>
      <div style={{fontSize:12,color:T.textMuted,marginBottom:18}}>to {CATEGORIES.find(c=>c.id===addingTo)?.label}</div>
      <div style={{fontSize:11,fontWeight:700,color:T.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Pick an icon</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
        {EMOJIS.map(e=><button key={e} onClick={()=>setNewIcon(e)} style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${newIcon===e?T.accent:T.border}`,background:newIcon===e?T.accentFaint:T.inputBg,cursor:"pointer",fontSize:18}}>{e}</button>)}
      </div>
      <div style={{fontSize:11,fontWeight:700,color:T.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Name</div>
      <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="e.g. Morning devotion..." style={{width:"100%",padding:"12px 14px",borderRadius:12,border:`1px solid ${T.inputBorder}`,background:T.inputBg,color:T.text,fontSize:14,marginBottom:16,display:"block"}}/>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>{setAddingTo(null);setNewLabel("");}} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${T.glassBorder}`,background:T.inputBg,color:T.textSub,fontSize:14,fontWeight:600}}>Cancel</button>
        <button onClick={addItem} style={{flex:2,padding:"12px",borderRadius:12,border:"none",background:T.accent,color:"#fff",fontSize:14,fontWeight:700}}>Add Item</button>
      </div>
    </div>
  </div>;

  // ── ITEM DETAIL VIEW ────────────────────────────────────────────────────────
  if(view&&itemId&&cat&&item){
    // Special devotions page
    if(itemId==="devotions"){
      return <DevotionsPage T={T} isDark={isDark} goBack={()=>setView(catId)} cycleTheme={cycleTheme} themeIcon={themeIcon}/>;
    }
    // Static populated pages
    if(STATIC_PAGES[itemId]){
      const PageComp = STATIC_PAGES[itemId];
      return <PageComp T={T} isDark={isDark} goBack={()=>setView(catId)} cycleTheme={cycleTheme} themeIcon={themeIcon}/>;
    }
    const key=catId+"/"+itemId;
    const data=itemData[key];
    const isLoad=loading[key];
    const tasks=data?.tasks||[];
    const done=tasks.filter(t=>checked[key+"-"+t.id]).length;
    const pct=tasks.length?Math.round(done/tasks.length*100):0;
    const [g1,g2]=cat.gradient;
    return <div style={root}>
      <Bg glow={item.color}/>
      <Sidebar open={sidebar} activeNav={activeNav} onNav={navTo} onClose={()=>setSidebar(false)} T={T}/>
      <Header T={T}
        left={<BackBtn/>}
        center={<><div style={{fontSize:15,fontWeight:700,color:T.text}}>{item.icon} {item.label}</div><div style={{fontSize:11,color:T.textMuted}}>{cat.label}</div></>}
        right={<ThemeBtn/>}
      />
      <div ref={mainRef} style={{flex:1,overflowY:"auto",paddingBottom:40,position:"relative",zIndex:1}}>
        <div style={{background:`linear-gradient(145deg,${g1},${g2})`,padding:"26px 20px 22px",position:"relative",overflow:"hidden",boxShadow:`0 8px 40px ${cat.shadow}`}}>
          <div style={{position:"absolute",top:-28,right:-28,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,.08)"}}/>
          <div style={{fontSize:44,marginBottom:10,filter:"drop-shadow(0 4px 8px rgba(0,0,0,.4))"}}>{item.icon}</div>
          <div style={{fontSize:26,fontWeight:800,color:"#fff",marginBottom:3}}>{item.label}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.65)",marginBottom:18}}>{item.desc}</div>
          <div style={{background:"rgba(255,255,255,.18)",borderRadius:99,height:9,overflow:"hidden",marginBottom:7}}>
            <div style={{width:pct+"%",height:"100%",background:"rgba(255,255,255,.9)",borderRadius:99,transition:"width .6s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,.6)"}}>{done} of {tasks.length} tasks</span>
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{pct}%</span>
          </div>
        </div>
        <div style={{padding:"16px 16px 40px"}}>
          {isLoad&&<div style={{textAlign:"center",padding:"60px 0",background:T.greetingBg,backdropFilter:"blur(12px)",borderRadius:18,border:`1px solid ${T.glassBorder}`,marginBottom:12}}>
            <div style={{width:44,height:44,border:`3px solid ${T.border}`,borderTop:`3px solid ${T.accent}`,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto"}}/>
            <div style={{color:T.textMuted,fontSize:13,marginTop:14}}>Generating {item.label} plan…</div>
          </div>}
          {data?.error&&<div style={{background:"rgba(30,8,8,0.7)",borderRadius:16,padding:20,border:"1px solid rgba(255,77,106,0.3)"}}>
            <div style={{color:"#FF4D6A",fontSize:13,marginBottom:12}}>Couldn't load. Check your internet connection.</div>
            <button onClick={()=>{setItemData(p=>{const n={...p};delete n[key];return n;});fetchItem(catId,itemId);}} style={{background:T.accent,color:isDark?"#060B14":"#fff",border:"none",borderRadius:12,padding:"10px 20px",fontSize:14,fontWeight:700}}>Retry</button>
          </div>}
          {data&&!data.error&&!isLoad&&<>
            <div style={{background:T.greetingBg,backdropFilter:"blur(20px)",borderRadius:18,padding:"16px 18px",marginBottom:12,border:`1px solid ${T.glassBorder}`,borderLeft:`3px solid ${item.color}`}}>
              <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:6}}>{data.greeting}</div>
              <div style={{fontSize:13,color:T.textSub,lineHeight:1.65}}>{data.focusStatement}</div>
              {data.scripture&&<div style={{fontSize:11,color:T.accent,marginTop:10,fontWeight:600}}>📖 {data.scripture}</div>}
            </div>
            <div style={{background:T.accentFaint,backdropFilter:"blur(16px)",borderRadius:16,padding:"12px 16px",marginBottom:18,border:`1px solid ${T.glassBorderStrong}`}}>
              <div style={{fontSize:10,fontWeight:700,color:T.accent,letterSpacing:1.2,textTransform:"uppercase",marginBottom:5}}>🎯 Today's Goal</div>
              <div style={{fontSize:13,color:T.text,lineHeight:1.65}}>{data.todayGoal}</div>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:T.textMuted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Tasks for Today</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {tasks.map((task,i)=>{
                const d=checked[key+"-"+task.id];
                const ic=impC(task.importance);
                return <div key={task.id} className="task-card" style={{background:d?T.taskDoneBg:T.taskBg,backdropFilter:"blur(18px)",borderRadius:18,overflow:"hidden",border:`1px solid ${d?T.glassBorder:T.glassBorderStrong}`,opacity:d?.55:1,transition:"all .25s",animationDelay:i*70+"ms"}}>
                  <div onClick={()=>toggleTask(key,task.id)} style={{padding:"14px 16px",cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{width:24,height:24,borderRadius:12,border:`2px solid ${d?ic:T.glassBorderStrong}`,background:d?ic:T.accentFaint,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,transition:"all .2s",boxShadow:d?`0 0 10px ${ic}55`:"none"}}>
                      {d&&<span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:5}}>
                        <span style={{fontSize:14,fontWeight:600,color:d?T.textMuted:T.text,textDecoration:d?"line-through":"none"}}>{task.title}</span>
                        <span style={{fontSize:10,fontWeight:700,background:ic+"18",color:ic,padding:"2px 9px",borderRadius:99,flexShrink:0,border:`1px solid ${ic}33`}}>{task.importance}</span>
                      </div>
                      <div style={{fontSize:12,color:T.accent,fontWeight:600,marginBottom:5}}>⏱ {task.duration}</div>
                      <div style={{fontSize:13,color:T.textSub,lineHeight:1.7}}>{task.description}</div>
                    </div>
                  </div>
                  {task.tip&&<div style={{background:T.accentFaint,borderTop:`1px solid ${T.glassBorder}`,padding:"8px 16px 10px 52px"}}>
                    <span style={{fontSize:12,color:T.accentDim}}>💡 {task.tip}</span>
                  </div>}
                </div>;
              })}
            </div>
            {pct===100&&<div style={{textAlign:"center",padding:"36px 20px",background:T.accentFaint,borderRadius:20,marginTop:20,border:`1px solid ${T.glassBorderStrong}`}}>
              <div style={{fontSize:50,marginBottom:10}}>🏆</div>
              <div style={{fontSize:18,fontWeight:800,color:T.accent,marginBottom:6}}>All done!</div>
              <div style={{fontSize:13,color:T.textSub,fontStyle:"italic"}}>"Well done, good and faithful servant."</div>
            </div>}
          </>}
        </div>
      </div>
    </div>;
  }

  // ── CATEGORY VIEW ───────────────────────────────────────────────────────────
  if(view&&cat&&!itemId){
    const [g1,g2]=cat.gradient;
    return <div style={root}>
      <Bg glow={cat.glowColor}/>
      <Sidebar open={sidebar} activeNav={activeNav} onNav={navTo} onClose={()=>setSidebar(false)} T={T}/>
      {addingTo&&<AddModal/>}
      <Header T={T}
        left={<BackBtn/>}
        center={<><div style={{fontSize:15,fontWeight:700,color:T.text}}>{cat.icon} {cat.label}</div><div style={{fontSize:11,color:T.textMuted}}>{items.length} items</div></>}
        right={<ThemeBtn/>}
      />
      <div ref={mainRef} style={{flex:1,overflowY:"auto",position:"relative",zIndex:1}}>
        <div style={{background:`linear-gradient(145deg,${g1},${g2})`,padding:"22px 20px 18px",position:"relative",overflow:"hidden",boxShadow:`0 6px 32px ${cat.shadow}`}}>
          <div style={{position:"absolute",top:-22,right:-22,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,.09)"}}/>
          <div style={{fontSize:38,marginBottom:8}}>{cat.icon}</div>
          <div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:2}}>{cat.label}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.65)",marginBottom:14}}>{cat.sub}</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1,background:"rgba(255,255,255,.2)",borderRadius:99,height:7,overflow:"hidden"}}>
              <div style={{width:cPct(catId)+"%",height:"100%",background:"rgba(255,255,255,.9)",borderRadius:99,transition:"width .5s"}}/>
            </div>
            <span style={{fontSize:13,fontWeight:800,color:"#fff",minWidth:32}}>{cPct(catId)}%</span>
          </div>
        </div>
        <div style={{padding:"16px 16px 100px"}}>
          <div style={{fontSize:10,fontWeight:700,color:T.textMuted,letterSpacing:1.8,textTransform:"uppercase",marginBottom:14}}>Items</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {items.map((it,i)=>{
              const p=iPct(catId,it.id);
              return <div key={it.id} onClick={()=>openItem(catId,it.id)} className="item-card"
                style={{background:T.itemCardBg,backdropFilter:"blur(22px)",borderRadius:20,padding:"16px 18px",border:`1px solid ${p>0?T.glassBorderStrong:T.glassBorder}`,cursor:"pointer",display:"flex",alignItems:"center",gap:14,animationDelay:i*60+"ms"}}>
                <div style={{width:48,height:48,borderRadius:16,background:it.color+"22",border:`1.5px solid ${it.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                  {it.icon}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:2}}>{it.label}</div>
                  <div style={{fontSize:11,color:T.textMuted,marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.desc}</div>
                  <div style={{background:"rgba(255,255,255,.07)",borderRadius:99,height:4,overflow:"hidden"}}>
                    <div style={{width:p+"%",height:"100%",background:`linear-gradient(90deg,${it.color}99,${it.color})`,borderRadius:99,transition:"width .4s"}}/>
                  </div>
                </div>
                <span style={{fontSize:13,fontWeight:800,color:p>0?it.color:T.textFaint,flexShrink:0}}>{p===100?"✅":p>0?p+"%":"→"}</span>
              </div>;
            })}
          </div>
        </div>
      </div>
      <button onClick={()=>setAddingTo(catId)} className="fab" style={{position:"absolute",bottom:28,right:20,zIndex:60,width:56,height:56,borderRadius:28,background:`linear-gradient(135deg,${g1},${g2})`,border:"1.5px solid rgba(255,255,255,.2)",boxShadow:`0 6px 28px ${cat.shadow}`,cursor:"pointer",fontSize:28,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
    </div>;
  }

  // ── HOME VIEW ───────────────────────────────────────────────────────────────
  return <div style={root}>
    <Bg/>
    <Sidebar open={sidebar} activeNav={activeNav} onNav={navTo} onClose={()=>setSidebar(false)} T={T}/>
    <Header T={T}
      left={<IconBtn onClick={()=>setSidebar(true)} T={T}><HamIcon color={T.text}/></IconBtn>}
      center={<><div style={{fontSize:10,fontWeight:700,letterSpacing:2.5,color:T.accentDim,textTransform:"uppercase"}}>Kingdom First</div><div style={{fontSize:15,fontWeight:800,color:T.text,letterSpacing:-.2}}>Daily Stewardship</div></>}
      right={<ThemeBtn/>}
    />
    <div ref={mainRef} style={{flex:1,overflowY:"auto",paddingBottom:32,position:"relative",zIndex:1}}>
      {/* Verse */}
      <div style={{margin:"16px 16px 0",background:`linear-gradient(135deg,${T.verseGrad[0]},${T.verseGrad[1]})`,borderRadius:22,padding:"20px 18px 18px",position:"relative",overflow:"hidden",boxShadow:"0 8px 40px #4A1A8A44"}}>
        <div style={{position:"absolute",top:-22,right:-22,width:110,height:110,borderRadius:"50%",background:"rgba(255,255,255,.08)"}}/>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase",color:"rgba(255,255,255,.6)",marginBottom:9}}>Word for Today · {dayName}</div>
        <div style={{fontSize:15,fontStyle:"italic",lineHeight:1.7,color:"#fff",marginBottom:10}}>"{verse.text}"</div>
        <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.8)"}}>— {verse.ref}</div>
      </div>
      {/* Greeting + overall */}
      <div style={{margin:"12px 16px 0",background:T.greetingBg,backdropFilter:"blur(24px)",borderRadius:20,padding:"16px 18px",border:`1px solid ${T.greetingBorder}`,boxShadow:T.cardShadow,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,width:110,height:110,borderRadius:"50%",background:"radial-gradient(circle,"+T.accent+"08 0%,transparent 70%)",transform:"translate(30%,-30%)"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:21,fontWeight:800,color:T.text,letterSpacing:-.3}}>{greet} 👋</div>
            <div style={{fontSize:12,color:T.textMuted,marginTop:3}}>Tap a category to start</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:32,fontWeight:800,color:T.accent,lineHeight:1}}>{overall}<span style={{fontSize:13,color:T.textMuted}}>%</span></div>
            <div style={{fontSize:10,color:T.textMuted}}>Today</div>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,.06)",borderRadius:99,height:6,overflow:"hidden",border:`1px solid ${T.glassBorder}`}}>
          <div style={{width:overall+"%",height:"100%",background:`linear-gradient(90deg,#4A1A8A,${T.accent})`,borderRadius:99,transition:"width .6s"}}/>
        </div>
      </div>
      {/* 6-card grid */}
      <div style={{padding:"16px 16px 32px"}}>
        <div style={{fontSize:10,fontWeight:700,color:T.textMuted,letterSpacing:1.8,textTransform:"uppercase",marginBottom:14}}>Life Areas</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {CATEGORIES.map((c,i)=>{
            const p=cPct(c.id);
            const [g1,g2]=c.gradient;
            return <div key={c.id} onClick={()=>openCat(c.id)} className="home-card"
              style={{background:`linear-gradient(145deg,${g1},${g2})`,borderRadius:22,padding:"18px 16px 14px",cursor:"pointer",position:"relative",overflow:"hidden",boxShadow:`0 8px 32px ${c.shadow},inset 0 1px 0 rgba(255,255,255,.1)`,minHeight:158,display:"flex",flexDirection:"column",justifyContent:"space-between",opacity:anims?1:0,transform:anims?"translateY(0) scale(1)":"translateY(24px) scale(.96)",transition:`opacity .5s ease ${i*90}ms,transform .5s cubic-bezier(.34,1.4,.64,1) ${i*90}ms`,border:"1px solid rgba(255,255,255,.08)"}}>
              <div style={{position:"absolute",top:-18,right:-18,width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,.13)",pointerEvents:"none"}}/>
              <div style={{position:"absolute",bottom:-24,right:12,width:62,height:62,borderRadius:"50%",background:"rgba(255,255,255,.07)",pointerEvents:"none"}}/>
              <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent)",pointerEvents:"none"}}/>
              <div>
                <div style={{fontSize:30,marginBottom:9}}>{c.icon}</div>
                <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:2}}>{c.label}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>{(catItems[c.id]||[]).length} items</div>
              </div>
              <div style={{marginTop:12}}>
                <div style={{background:"rgba(255,255,255,.2)",borderRadius:99,height:5,overflow:"hidden",marginBottom:7}}>
                  <div style={{width:p+"%",height:"100%",background:"rgba(255,255,255,.9)",borderRadius:99,transition:"width .5s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:10,color:"rgba(255,255,255,.55)"}}>{p>0?p+"% complete":"Tap to explore"}</span>
                  <span style={{fontSize:12,fontWeight:800,color:"#fff"}}>{p===100?"✅":p>0?p+"%":"→"}</span>
                </div>
              </div>
            </div>;
          })}
        </div>
      </div>
    </div>
  </div>;
}

// ── Helper: persist per-item checked state ──
function useChecklist(storageKey) {
  const [done, setDone] = useState({});
  useEffect(() => { (async()=>{ const r=await sg(storageKey); if(r?.value) setDone(JSON.parse(r.value)); })(); }, []);
  const toggle = (id) => { const n={...done,[id]:!done[id]}; setDone(n); ss(storageKey,JSON.stringify(n)); };
  const count = Object.values(done).filter(Boolean).length;
  return [done, toggle, count];
}

// SHOPPING PAGE
// ════════════════════════════════════════════════════════════════
function ShoppingPage({T,isDark,goBack,cycleTheme,themeIcon}) {
  const today = new Date();
  const todayKey = today.getFullYear()+"-"+today.getMonth()+"-"+today.getDate();
  const [done,toggle,count] = useChecklist("shopping-"+todayKey);
  const [listItems, setListItems] = useState([]);
  const [newShopItem, setNewShopItem] = useState("");
  useEffect(()=>{ (async()=>{ const r=await sg("shoplist"); if(r?.value) setListItems(JSON.parse(r.value)); })(); },[]);
  const addShopItem = () => { if(!newShopItem.trim()) return; const n=[...listItems,{id:Date.now(),text:newShopItem.trim(),bought:false}]; setListItems(n); ss("shoplist",JSON.stringify(n)); setNewShopItem(""); };
  const toggleBought = (id) => { const n=listItems.map(x=>x.id===id?{...x,bought:!x.bought}:x); setListItems(n); ss("shoplist",JSON.stringify(n)); };
  const clearBought = () => { const n=listItems.filter(x=>!x.bought); setListItems(n); ss("shoplist",JSON.stringify(n)); };
  const color = "#60A5FA";
  const tasks = [
    {id:"sh1",icon:"📋",title:"Review shopping list before going",desc:"Don't shop without a list. Write every item needed before leaving the house.",note:"Unplanned shopping costs 30–40% more on average."},
    {id:"sh2",icon:"💰",title:"Set a shopping budget",desc:"Decide your maximum spend before you enter any shop or open any app.",note:"Budget first, then shop. Not the other way around."},
    {id:"sh3",icon:"🧾",title:"Keep your receipt",desc:"Photograph or file every receipt. This feeds directly into your budget tracking.",note:"Receipt photos in one WhatsApp group or Google Drive folder works perfectly."},
  ];
  const pct = tasks.length ? Math.round(count/tasks.length*100) : 0;
  return <StandardPage T={T} isDark={isDark} goBack={goBack} cycleTheme={cycleTheme} themeIcon={themeIcon} gradStart="#1E3A5F" gradEnd="#2563EB" icon="🛒" title="Shopping" subtitle="Track Purchases" glowColor={color}>
    <SectionHero icon="🛒" title="Shopping" subtitle="Intentional Purchasing" color={color} gradStart="#1E3A5F" gradEnd="#2563EB" pct={pct} done={count} total={tasks.length}/>
    <div style={{padding:"16px 16px 40px"}}>
      {tasks.map(t=><TaskCard key={t.id} {...t} color={color} done={!!done[t.id]} onToggle={()=>toggle(t.id)}/>)}
      <SectionLabel label="🛒 Shopping List" color={color}/>
      <div style={{background:"rgba(13,21,32,.7)",backdropFilter:"blur(18px)",borderRadius:18,padding:"14px 16px",border:"1px solid rgba(96,165,250,.18)",marginBottom:10}}>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newShopItem} onChange={e=>setNewShopItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addShopItem()} placeholder="Add item..." style={{flex:1,background:"rgba(18,28,46,.6)",border:"1px solid rgba(96,165,250,.2)",borderRadius:10,padding:"9px 12px",color:"#E8F4FF",fontSize:13,outline:"none"}}/>
          <button onClick={addShopItem} style={{background:color,color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+</button>
        </div>
        {listItems.length===0&&<div style={{textAlign:"center",color:"#3A5A7A",fontSize:12,padding:"10px 0"}}>Your list is empty</div>}
        {listItems.map(item=><div key={item.id} onClick={()=>toggleBought(item.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer",borderBottom:"1px solid rgba(0,212,255,.06)"}}>
          <div style={{width:20,height:20,borderRadius:10,border:`2px solid ${item.bought?color:"rgba(0,212,255,.2)"}`,background:item.bought?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {item.bought&&<span style={{color:"#fff",fontSize:11,fontWeight:800}}>✓</span>}
          </div>
          <span style={{fontSize:13,color:item.bought?"#3A5A7A":"#E8F4FF",textDecoration:item.bought?"line-through":"none"}}>{item.text}</span>
        </div>)}
        {listItems.some(x=>x.bought)&&<button onClick={clearBought} style={{marginTop:10,fontSize:11,color:"#F87171",background:"none",border:"1px solid rgba(248,113,113,.2)",borderRadius:8,padding:"5px 12px",cursor:"pointer",width:"100%"}}>Clear bought items</button>}
      </div>
    </div>
  </StandardPage>;
}

          <input value={savedAmt} onChange={e=>setSavedAmt(e.target.value)} placeholder="Saved so far" type="number" style={{flex:1,background:"rgba(18,28,46,.6)",border:"1px solid rgba(191,219,254,.2)",borderRadius:10,padding:"9px 12px",color:"#E8F4FF",fontSize:13,outline:"none"}}/>
        </div>
        <button onClick={addGoal} style={{width:"100%",background:color,color:"#0F1E2E",border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add Goal</button>
      </div>
    </div>
  </StandardPage>;
}

// Book name → enduring word slug mapping
function ewSlug(ref) {
  const book = ref.split(" ").slice(0, -1).join("-").toLowerCase()
    .replace("1 ","1-").replace("2 ","2-").replace("3 ","3-")
    .replace("song of solomon","song-of-solomon")
    .replace(" ","");
  const chap = ref.split(" ").slice(-1)[0].split(":")[0].split("-")[0];
  const bookMap = {
    "matthew":"matthew","mark":"mark","luke":"luke","john":"john",
    "acts":"acts","romans":"romans","1-corinthians":"1-corinthians",
    "2-corinthians":"2-corinthians","galatians":"galatians","ephesians":"ephesians",
    "philippians":"philippians","colossians":"colossians","1-thessalonians":"1-thessalonians",
    "2-thessalonians":"2-thessalonians","1-timothy":"1-timothy","2-timothy":"2-timothy",
    "titus":"titus","philemon":"philemon","hebrews":"hebrews","james":"james",
    "1-peter":"1-peter","2-peter":"2-peter","1-john":"1-john","2-john":"2-john",
    "3-john":"3-john","jude":"jude","revelation":"revelation",
    "genesis":"genesis","exodus":"exodus","leviticus":"leviticus","numbers":"numbers",
    "deuteronomy":"deuteronomy","joshua":"joshua","judges":"judges","ruth":"ruth",
    "1-samuel":"1-samuel","2-samuel":"2-samuel","1-kings":"1-kings","2-kings":"2-kings",
    "1-chronicles":"1-chronicles","2-chronicles":"2-chronicles","ezra":"ezra",
    "nehemiah":"nehemiah","esther":"esther","job":"job","psalms":"psalm",
    "psalm":"psalm","proverbs":"proverbs","ecclesiastes":"ecclesiastes",
    "song-of-solomon":"song-of-solomon","isaiah":"isaiah","jeremiah":"jeremiah",
    "lamentations":"lamentations","ezekiel":"ezekiel","daniel":"daniel",
    "hosea":"hosea","joel":"joel","amos":"amos","obadiah":"obadiah",
    "jonah":"jonah","micah":"micah","nahum":"nahum","habakkuk":"habakkuk",
    "zephaniah":"zephaniah","haggai":"haggai","zechariah":"zechariah","malachi":"malachi"
  };
  const slug = bookMap[book] || book;
  return `https://enduringword.com/bible-commentary/${slug}-${chap}/`;
}

// Calculate which plan day we are on (day of year, cycling 1-300)
function getPlanDay(offsetDays=0) {
  const start = new Date(new Date().getFullYear(), 0, 1);
  const diff = Math.floor((Date.now() - start) / 86400000);
  let d = ((diff + offsetDays) % 300) + 1;
  if (d < 1) d += 300;
  return d;
}

const TRACK_META = [
  { key:0, label:"Gospels",      icon:"✝️",  color:"#A78BFA" },
  { key:1, label:"Epistles",     icon:"📜",  color:"#38BDF8" },
  { key:2, label:"Wisdom",       icon:"🕊️", color:"#FBBF24" },
  { key:3, label:"Old Testament",icon:"📖",  color:"#34D399" },
];

// ═══════════════════════════════════════════════════════════════════════════
// DEVOTIONS PAGE COMPONENT
// ═══════════════════════════════════════════════════════════════════════════
function DevotionsPage({T, isDark, goBack, cycleTheme, themeIcon}) {
  const todayPlanDay = getPlanDay(0);
  const storageKey = "devot-day-" + new Date().getFullYear() + "-" + new Date().getMonth() + "-" + new Date().getDate();

  const [planDay,    setPlanDay]    = useState(todayPlanDay);
  const [readDone,   setReadDone]   = useState({});
  const [commentary, setCommentary] = useState(null); // {url, ref}
  const [showComm,   setShowComm]   = useState(false);
  const [offsetDay,  setOffsetDay]  = useState(0);   // day navigation offset
  const [noteText,   setNoteText]   = useState("");
  const [savedNote,  setSavedNote]  = useState("");
  const [noteSaved,  setNoteSaved]  = useState(false);

  const readings = NAV_PLAN[planDay] || NAV_PLAN[1];
  const doneCount = TRACK_META.filter(t => readDone[planDay+"-"+t.key]).length;
  const pct = Math.round(doneCount / 4 * 100);

  useEffect(() => {
    (async () => {
      const r = await sg("devot-done");
      if (r?.value) setReadDone(JSON.parse(r.value));
      const n = await sg("devot-note-"+storageKey);
      if (n?.value) setSavedNote(n.value);
    })();
  }, []);

  const toggleRead = (trackIdx) => {
    const k = planDay+"-"+trackIdx;
    const next = {...readDone, [k]: !readDone[k]};
    setReadDone(next);
    ss("devot-done", JSON.stringify(next));
  };

  const openCommentary = (ref) => {
    setCommentary({url: ewSlug(ref), ref});
    setShowComm(true);
  };

  const changeDay = (delta) => {
    const newOffset = offsetDay + delta;
    const newDay = getPlanDay(newOffset);
    setOffsetDay(newOffset);
    setPlanDay(newDay);
  };

  const saveNote = async () => {
    await ss("devot-note-"+storageKey, noteText);
    setSavedNote(noteText);
    setNoteSaved(true);
    setTimeout(() => setNoteSaved(false), 2000);
  };

  // 300-day progress dots (show 30 at a time centered on current)
  const windowDays = [];
  for (let i = -14; i <= 15; i++) {
    let d = ((planDay - 1 + i + 300) % 300) + 1;
    windowDays.push({d, offset: i, isToday: i === 0});
  }

  // Glass card style helper
  const gc = (extra={}) => ({
    background: T.taskBg,
    backdropFilter: "blur(18px)",
    WebkitBackdropFilter: "blur(18px)",
    borderRadius: 18,
    border: "1px solid " + T.glassBorder,
    boxShadow: T.cardShadow,
    ...extra
  });

  return (
    <div style={{background:T.bg,minHeight:"100vh",width:"100%",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden",color:T.text,fontFamily:"'DM Sans',sans-serif"}}>
      {/* Atmosphere */}
      <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
        <Stars/><GridLines/>
        <div style={{position:"absolute",top:"10%",left:"50%",width:280,height:280,borderRadius:"50%",background:"radial-gradient(circle,#A78BFA14 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:"20%",left:"10%",width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle,#38BDF814 0%,transparent 70%)"}}/>
      </div>

      {/* Header */}
      <div className="glass-header" style={{padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50,background:T.headerBg,borderBottom:"1px solid "+T.glassBorder}}>
        <button onClick={goBack} style={{width:36,height:36,borderRadius:10,background:T.btnBg,backdropFilter:"blur(14px)",border:"1px solid "+T.glassBorder,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8 2L2 8L8 14" stroke={T.text} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#A78BFA",textTransform:"uppercase"}}>Navigators Plan</div>
          <div style={{fontSize:15,fontWeight:800,color:T.text}}>Personal Devotions</div>
        </div>
        <button onClick={cycleTheme} style={{width:36,height:36,borderRadius:18,background:T.btnBg,backdropFilter:"blur(12px)",border:"1px solid "+T.glassBorder,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:"pointer"}}>{themeIcon}</button>
      </div>

      <div style={{flex:1,overflowY:"auto",paddingBottom:40,position:"relative",zIndex:1}}>

        {/* Hero banner */}
        <div style={{background:"linear-gradient(135deg,#4A1A8A,#A78BFA)",padding:"22px 20px 18px",position:"relative",overflow:"hidden",boxShadow:"0 6px 32px #4A1A8A55"}}>
          <div style={{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,.1)"}}/>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2.5,color:"rgba(255,255,255,.6)",textTransform:"uppercase",marginBottom:8}}>Bible in One Year · Day {planDay} of 300</div>
          <div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:14}}>📖 {new Date().toLocaleDateString("en-KE",{weekday:"long",month:"long",day:"numeric"})}</div>
          <div style={{background:"rgba(255,255,255,.18)",borderRadius:99,height:8,overflow:"hidden",marginBottom:6}}>
            <div style={{width:pct+"%",height:"100%",background:"rgba(255,255,255,.9)",borderRadius:99,transition:"width .5s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,.65)"}}>{doneCount} of 4 tracks read today</span>
            <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{pct}%</span>
          </div>
        </div>

        {/* Day navigator */}
        <div style={{padding:"14px 16px 0"}}>
          <div style={{...gc(), padding:"12px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button onClick={()=>changeDay(-1)} style={{background:"rgba(167,139,250,.15)",border:"1px solid rgba(167,139,250,.3)",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#A78BFA",fontSize:16,flexShrink:0}}>‹</button>
            <div style={{flex:1,overflowX:"auto",display:"flex",gap:4,alignItems:"center",padding:"2px 0"}}>
              {windowDays.map(({d,isToday})=>{
                const done = TRACK_META.filter(t=>readDone[d+"-"+t.key]).length;
                return (
                  <button key={d} onClick={()=>{setPlanDay(d);setOffsetDay(d-todayPlanDay);}}
                    style={{flexShrink:0,width:isToday?36:28,height:isToday?36:28,borderRadius:isToday?12:8,border:isToday?"2px solid #A78BFA":"1px solid "+T.glassBorder,background:isToday?"rgba(167,139,250,.25)":done===4?"rgba(167,139,250,.12)":"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,transition:"all .15s"}}>
                    <span style={{fontSize:isToday?10:9,fontWeight:isToday?700:500,color:isToday?"#A78BFA":T.textMuted}}>{d}</span>
                    {done>0&&<div style={{display:"flex",gap:1}}>{[...Array(done)].map((_,i)=><div key={i} style={{width:3,height:3,borderRadius:99,background:"#A78BFA"}}/>)}</div>}
                  </button>
                );
              })}
            </div>
            <button onClick={()=>changeDay(1)} style={{background:"rgba(167,139,250,.15)",border:"1px solid rgba(167,139,250,.3)",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#A78BFA",fontSize:16,flexShrink:0}}>›</button>
          </div>

          {/* 4 track cards */}
          <div style={{fontSize:10,fontWeight:700,color:T.textMuted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Today's Readings — Day {planDay}</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            {TRACK_META.map((track)=>{
              const ref = readings[track.key];
              const done = readDone[planDay+"-"+track.key];
              return (
                <div key={track.key} style={{...gc({border:"1px solid "+(done?track.color+"44":T.glassBorder),opacity:done?.75:1}),padding:"14px 16px",overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    {/* Check circle */}
                    <button onClick={()=>toggleRead(track.key)} style={{width:32,height:32,borderRadius:16,border:"2px solid "+(done?track.color:T.glassBorderStrong),background:done?track.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",transition:"all .2s",boxShadow:done?"0 0 10px "+track.color+"55":"none"}}>
                      {done&&<span style={{color:"#fff",fontSize:14,fontWeight:800}}>✓</span>}
                    </button>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,fontWeight:700,color:track.color,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{track.icon} {track.label}</div>
                      <div style={{fontSize:16,fontWeight:700,color:done?T.textMuted:T.text,textDecoration:done?"line-through":"none"}}>{ref}</div>
                    </div>
                    {/* Commentary button */}
                    <button onClick={()=>openCommentary(ref)} style={{width:36,height:36,borderRadius:10,background:"rgba(167,139,250,.12)",border:"1px solid rgba(167,139,250,.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}} title="Open Enduring Word commentary">
                      <span style={{fontSize:16}}>💬</span>
                    </button>
                  </div>
                  {/* Bible.com link */}
                  <div style={{marginTop:10,marginLeft:44}}>
                    <a href={"https://www.bible.com/bible/116/"+ref.replace(/ /g,".").replace(/:/g,".").toUpperCase()+".NLT"} target="_blank" rel="noopener noreferrer"
                      style={{fontSize:11,color:track.color,textDecoration:"none",background:track.color+"18",padding:"4px 10px",borderRadius:99,border:"1px solid "+track.color+"33",display:"inline-flex",alignItems:"center",gap:4}}>
                      📖 Read on Bible.com
                    </a>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Enduring Word Commentary panel */}
          {showComm && commentary && (
            <div style={{...gc(),marginBottom:16,overflow:"hidden"}}>
              <div style={{padding:"12px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+T.glassBorder}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:"#A78BFA",letterSpacing:1,textTransform:"uppercase"}}>💬 Enduring Word Commentary</div>
                  <div style={{fontSize:13,color:T.text,fontWeight:600,marginTop:2}}>{commentary.ref}</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <a href={commentary.url} target="_blank" rel="noopener noreferrer"
                    style={{fontSize:11,color:"#A78BFA",background:"rgba(167,139,250,.15)",border:"1px solid rgba(167,139,250,.3)",padding:"5px 10px",borderRadius:8,textDecoration:"none",display:"flex",alignItems:"center",gap:4}}>
                    ↗ Open
                  </a>
                  <button onClick={()=>setShowComm(false)} style={{background:"none",border:"1px solid "+T.glassBorder,borderRadius:8,width:30,height:30,color:T.textMuted,cursor:"pointer",fontSize:14}}>✕</button>
                </div>
              </div>
              <div style={{position:"relative",height:420}}>
                <iframe
                  src={commentary.url}
                  style={{width:"100%",height:"100%",border:"none",display:"block",background:"#fff"}}
                  title={"Enduring Word: "+commentary.ref}
                  sandbox="allow-same-origin allow-scripts allow-popups"
                />
                <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"8px 12px",background:T.taskBg,backdropFilter:"blur(12px)",borderTop:"1px solid "+T.glassBorder,fontSize:10,color:T.textMuted,textAlign:"center"}}>
                  Note: Some browsers block iframes. Tap "↗ Open" to view in a new tab.
                </div>
              </div>
            </div>
          )}

          {/* Quick scripture notes */}
          <div style={{...gc(),padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:"#FBBF24",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>✍️ Today's Notes & Reflections</div>
            <textarea
              value={noteText||savedNote}
              onChange={e=>setNoteText(e.target.value)}
              placeholder="What is God saying to you today? Write key verses, insights, prayer points..."
              style={{width:"100%",background:"transparent",border:"none",resize:"none",color:T.text,fontSize:13,fontFamily:"'DM Sans',sans-serif",lineHeight:1.7,outline:"none",minHeight:80,boxSizing:"border-box"}}
              rows={4}
            />
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
              <span style={{fontSize:11,color:T.textFaint}}>{savedNote?"Last saved ✓":"Not saved yet"}</span>
              <button onClick={saveNote} style={{background:"#A78BFA",color:"#fff",border:"none",borderRadius:10,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                {noteSaved?"Saved! ✓":"Save Note"}
              </button>
            </div>
          </div>

          {/* 5-week rolling progress grid */}
          <div style={{...gc(),padding:"14px 16px"}}>
            <div style={{fontSize:10,fontWeight:700,color:T.textMuted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Recent Progress</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:4}}>
              {Array.from({length:30},(_,i)=>{
                const d = ((planDay - 1 - 29 + i + 300) % 300) + 1;
                const done = TRACK_META.filter(t=>readDone[d+"-"+t.key]).length;
                const isToday = d === planDay;
                const bg = done===4?"#A78BFA":done===3?"#A78BFA99":done===2?"#A78BFA55":done===1?"#A78BFA22":"transparent";
                return <div key={i} style={{aspectRatio:"1",borderRadius:4,background:bg,border:"1px solid "+(isToday?"#A78BFA":T.glassBorder),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>{setPlanDay(d);}}>
                  {isToday&&<div style={{width:4,height:4,borderRadius:99,background:"#A78BFA"}}/>}
                </div>;
              })}
            </div>
            <div style={{display:"flex",gap:14,marginTop:10,justifyContent:"center"}}>
              {[{bg:"#A78BFA",l:"Complete"},{bg:"#A78BFA55",l:"Partial"},{bg:"transparent",l:"Not read"}].map(x=>(
                <div key={x.l} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:10,height:10,borderRadius:2,background:x.bg,border:"1px solid "+T.glassBorder}}/>
                  <span style={{fontSize:9,color:T.textFaint}}>{x.l}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
